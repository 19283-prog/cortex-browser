<!DOCTYPE html>
<html>
<head>

<title>Cortex Browser</title>

<style>

body{
margin:0;
font-family:Arial;
}

#toolbar{
background:#222;
padding:10px;
display:flex;
gap:5px;
}

#url{
flex:1;
padding:6px;
}

iframe{
width:100%;
height:95vh;
border:none;
}

</style>

</head>

<body>

<div id="toolbar">

<button onclick="back()">Back</button>
<button onclick="forward()">Forward</button>
<button onclick="refresh()">Refresh</button>

<input id="url" placeholder="Enter URL">

<button onclick="go()">Go</button>

</div>

<iframe id="view" src="https://example.com"></iframe>

<script>

let view=document.getElementById("view")

function go(){

let url=document.getElementById("url").value

if(!url.startsWith("http")){
url="https://"+url
}

view.src=url

}

function back(){
view.contentWindow.history.back()
}

function forward(){
view.contentWindow.history.forward()
}

function refresh(){
view.contentWindow.location.reload()
}

</script>

</body>
</html>
